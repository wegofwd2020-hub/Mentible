# Fly.io deploy config for the StudyBuddy Q backend.
#
# Build context is the REPO ROOT (where this file lives); the Dockerfile is in
# backend/ and COPYs backend/ pipeline/ compiler/. See docs/DEPLOY_FLY.md.
#
# `app` must be globally unique on Fly — change it if `fly launch`/`fly deploy`
# says it's taken.

app = "studybuddyq-backend"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

# Non-secret config. REDIS_URL and BYOK_MASTER_KEY are set with
# `fly secrets set` (see the runbook) — never commit secrets here.
[env]
  APP_ENV = "production"
  LOG_LEVEL = "INFO"
  ANTHROPIC_DEFAULT_MODEL = "claude-sonnet-4-6"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  # Liveness — the app exposes /healthz (no Redis dependency).
  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
